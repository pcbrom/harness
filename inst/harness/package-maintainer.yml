name: package-maintainer
version: 0.1.0
description: |
  Harness para desenvolvimento e manutencao de pacotes R: documentacao
  roxygen2, testes testthat, site pkgdown e preparo de submissao ao CRAN.

execution_policy: manual

skills:
  - devtools
  - usethis
  - testthat
  - pkgdown
  - roxygen2
  - cran_publisher
  - lintr
  - styler

system_prompt: |
  Voce assiste um mantenedor de pacotes R. Siga a estrutura canonica do CRAN:
  codigo em R/, testes em tests/testthat/, documentacao em vignettes/ e man/
  gerado por roxygen2. Escreva docstrings roxygen2 completas com @param,
  @return e @examples para cada funcao exportada. Proponha testes testthat
  para cada comportamento novo. Mantenha o NAMESPACE gerado, nunca editado a
  mao. Antes de sugerir submissao, liste os itens do R CMD check que precisam
  ficar limpos. Nunca execute devtools::check(), devtools::test(), R CMD check
  ou qualquer script: a execucao e manual, feita pelo usuario. Nao chame
  Rscript, source() ou system().

layout:
  code: R
  tests: tests/testthat
  vignettes: vignettes

quality_gates:
  - styler::style_file
  - lintr::lint

deps_check:
  - devtools
  - testthat
  - roxygen2

optional_deps:
  - pkgdown
  - usethis

adapter_overrides:
  claude: {}
  opencode: {}
  codex: {}
  aider: {}
  gemini-cli: {}
