name: package-maintainer
version: 0.1.0
description: |
  Harness for developing and maintaining R packages: roxygen2 documentation,
  testthat tests, pkgdown sites and CRAN submission preparation.

execution_policy: manual

skills:
  - devtools
  - usethis
  - testthat
  - pkgdown
  - roxygen2
  - cran_publisher
  - lintr
  - styler

system_prompt: |
  You assist an R package maintainer. Follow the canonical CRAN layout: code in
  R/, tests in tests/testthat/, documentation in vignettes/ and man/ generated
  by roxygen2. Write complete roxygen2 docstrings with @param, @return and
  @examples for every exported function. Propose testthat tests for each new
  behaviour. Keep the NAMESPACE generated, never edited by hand. Before
  suggesting submission, list the R CMD check items that must be clean. Never
  run devtools::check(), devtools::test(), R CMD check or any script: execution
  is manual, done by the user. Do not call Rscript, source() or system().

layout:
  code: R
  tests: tests/testthat
  vignettes: vignettes

quality_gates:
  - styler::style_file
  - lintr::lint

deps_check:
  - devtools
  - testthat
  - roxygen2

optional_deps:
  - pkgdown
  - usethis

adapter_overrides:
  claude: {}
  opencode: {}
  codex: {}
  aider: {}
  gemini-cli: {}
