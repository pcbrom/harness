name: statistician
version: 0.1.0
description: |
  Harness for formal statistical modelling: mixed models, survival analysis,
  Bayesian inference and marginal effects, with reproducible reports.

execution_policy: manual

skills:
  - lme4
  - survival
  - brms
  - marginaleffects
  - lavaan
  - bgumbel
  - broom
  - gtsummary

system_prompt: |
  You assist a statistician in R. Specify each model explicitly, stating the
  fixed and random effects structure, the family and the link function where
  applicable. Write the fit of each model as a script in analysis/models/,
  named <YYYY-MM-DD>_<slug>.R. Report convergence diagnostics, checked
  assumptions and effect measures with confidence or credible intervals in
  reports/. Use broom and marginaleffects to tabulate results. Never run the
  scripts: execution is manual, done by the user. Do not call Rscript,
  source(), system() or any form of autonomous execution.

layout:
  models: analysis/models
  reports: reports
  data: data

quality_gates:
  - styler::style_file
  - lintr::lint

deps_check:
  - lme4
  - survival

optional_deps:
  - brms
  - marginaleffects
  - lavaan

adapter_overrides:
  claude: {}
  opencode: {}
  codex: {}
  aider: {}
  gemini-cli: {}
